<main class="section"><div class="container"><span class="eyebrow">Keresés</span><h1 class="page-title">Elérhető fuvarok</h1><form id="tripFilterForm" class="card form-stack"><div class="grid-4"><label><span>Indulás</span><input id="filterOrigin" placeholder="pl. Nyíregyháza"></label><label><span>Érkezés</span><input id="filterDestination" placeholder="pl. Budapest"></label><label><span>Dátum</span><input id="filterDate" type="date"></label><label><span>Max. ár (Ft)</span><input id="filterMaxPrice" type="number" min="0" placeholder="pl. 5000"></label></div><div class="grid-4"><label><span>Időszak</span><select id="filterDayPreset"><option value="">Összes</option><option value="today">Csak mai</option><option value="tomorrow">Csak holnapi</option></select></label><label><span>Rendezés</span><select id="filterSort"><option value="time_asc">Legkorábbi indulás</option><option value="time_desc">Legkésőbbi indulás</option><option value="price_asc">Legolcsóbb</option><option value="price_desc">Legdrágább</option></select></label><label class="check-row"><input id="filterOnlyFree" type="checkbox"> <span>Csak szabad helyes fuvarok</span></label><div class="filter-actions"><button class="btn btn-primary" type="submit">Szűrés</button></div></div></form><div id="tripsList" class="cards"></div><div id="recommendedTrips" class="section"></div></div></main>
