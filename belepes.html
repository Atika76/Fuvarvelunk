<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belépés / Regisztráció – Utazz Velem</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo" href="index.html">
        <img src="assets/logo-utazzvelem.svg" alt="Utazz Velem logó" />
        <span data-setting="siteName">Utazz Velem</span>
      </a>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="fuvarok.html">Fuvarok</a>
        <a href="fuvar-feladas.html">Fuvar feladása</a>
        <a href="kapcsolat.html">Kapcsolat</a>
        <a href="belepes.html" class="nav-cta active" data-auth="guest">Belépés / regisztráció</a>
        <a href="admin.html" class="nav-cta hidden" data-auth="admin">Admin</a>
        <span class="nav-user hidden" data-auth="user">
          <span data-user-email></span>
          <a href="#" class="nav-cta nav-logout" data-logout>Kilépés</a>
        </span>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow">Fiók</span>
          <h1>Belépés / regisztráció</h1>
          <p class="lead">Fuvar feladáshoz és foglaláshoz be kell jelentkezni.</p>
        </div>
      </div>
      <div class="grid-2 auth-grid">
        <section class="card">
          <h2>Belépés</h2>
          <form id="loginForm" class="form-stack">
            <label><span>E-mail</span><input type="email" name="email" required /></label>
            <label><span>Jelszó</span><input type="password" name="password" required /></label>
            <div id="loginMsg" class="form-message"></div>
            <button class="btn btn-primary" type="submit">Belépés</button>
          </form>
        </section>
        <section class="card">
          <h2>Regisztráció</h2>
          <form id="registerForm" class="form-stack">
            <label><span>Név</span><input type="text" name="name" required /></label>
            <label><span>E-mail</span><input type="email" name="email" required /></label>
            <label><span>Jelszó</span><input type="password" name="password" minlength="6" required /></label>
            <div class="notice">A regisztráció után e-mailes megerősítést kérhet a rendszer.</div>
            <div id="registerMsg" class="form-message"></div>
            <button class="btn btn-primary" type="submit">Regisztráció</button>
          </form>
        </section>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
