<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Belépés / Regisztráció – Utazz Velem</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-auth-page>
  <header class="site-header">
    <div class="container nav">
      <a class="logo" href="index.html">
        <img src="assets/logo-utazzvelem.svg" alt="Utazz Velem logó" />
        <span data-setting="siteName">Utazz Velem</span>
      </a>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="fuvarok.html">Fuvarok</a>
        <a href="fuvar-feladas.html">Fuvar feladása</a>
        <a href="kapcsolat.html">Kapcsolat</a>
        <a href="belepes.html" class="nav-cta active" data-guest-link>Belépés / Regisztráció</a>
        <span class="nav-user" data-user-badge hidden>
          <span data-user-email></span>
          <button type="button" class="nav-cta nav-logout" data-logout-button>Kilépés</button>
        </span>
        <a href="admin.html" class="nav-cta" data-admin-link hidden>Admin</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container narrow">
      <section class="card glass-glow auth-card">
        <span class="eyebrow">Fiók</span>
        <h1 id="authModeLabel">Belépés</h1>
        <p class="lead small">Regisztráció után be tudsz lépni, az admin gomb pedig csak a megfelelő admin e-mail címmel jelenik meg.</p>
        <form id="authForm" class="form-stack">
          <input type="hidden" name="mode" id="authMode" value="signin" />
          <label><span>E-mail cím</span><input type="email" name="email" placeholder="pelda@email.hu" required /></label>
          <label><span>Jelszó</span><input type="password" name="password" placeholder="Legalább 6 karakter" required /></label>
          <button type="submit" class="btn btn-primary" id="authSubmitBtn">Belépés</button>
          <button type="button" class="btn btn-secondary" id="authModeSwitch">Még nincs fiókom, regisztrálok</button>
          <p id="authMessage" class="form-message"></p>
        </form>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
</body>
</html>
