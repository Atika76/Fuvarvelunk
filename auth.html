<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="styles.css" />
  <title>Belépés / regisztráció – Utazz Velem</title>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="logo-wrap" href="index.html"><img src="assets/logo-utazzvelem.svg" alt="Utazz Velem logo"><span data-brand>Utazz Velem</span></a>
      <nav>
        <a href="index.html">Főoldal</a>
        <a href="fuvarok.html">Fuvarok</a>
        <a href="fuvar-feladas.html">Fuvar feladása</a>
        <a href="kapcsolat.html">Kapcsolat</a>
        <a href="auth.html" data-auth="guest">Belépés / regisztráció</a>
        <a href="admin.html" data-auth="admin" class="hidden">Admin</a>
        <a href="#" data-auth="user" data-logout class="hidden">Kilépés</a>
      </nav>
    </div>
  </header>
  <main class="section">
    <div class="narrow">
      <div class="section-head"><div><span class="eyebrow">Fiók</span><h1 class="page-title">Belépés / regisztráció</h1><p class="lead">Fuvar feladáshoz és foglaláshoz be kell jelentkezni.</p></div></div>
      <div class="auth-wrap">
        <form id="loginForm" class="card form-stack">
          <h2 style="margin:0">Belépés</h2>
          <label><span>E-mail</span><input name="email" type="email" required></label>
          <label><span>Jelszó</span><input name="password" type="password" required></label>
          <div class="form-message" id="loginMsg"></div>
          <button class="btn btn-primary" type="submit">Belépés</button>
        </form>
        <form id="registerForm" class="card form-stack">
          <h2 style="margin:0">Regisztráció</h2>
          <label><span>Név</span><input name="name" required></label>
          <label><span>E-mail</span><input name="email" type="email" required></label>
          <label><span>Jelszó</span><input name="password" type="password" minlength="6" required></label>
          <div class="notice">A regisztráció után e-mailes megerősítést kérhet a rendszer.</div>
          <div class="form-message" id="registerMsg"></div>
          <button class="btn btn-primary" type="submit">Regisztráció</button>
        </form>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
